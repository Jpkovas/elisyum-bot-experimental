[install]
# Configura o comportamento de instalação do Bun
peer = true
production = false
optional = true
dev = true
exact = false

[install.scripts]
# Permite apenas install scripts conhecidos que o projeto precisa em build/deploy.
disable = false
allowList = ["canvas", "@napi-rs/image", "@ffmpeg-installer/ffmpeg"]

[install.cache]
# Habilita cache de instalação
disable = false

[install.lockfile]
# Configurações do lockfile
save = true
print = "bun"

[run]
# Shell para executar scripts
shell = "system"
